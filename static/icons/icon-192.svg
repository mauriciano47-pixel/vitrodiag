<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="32" fill="#0e1013"/>
  <!-- Botella de vidrio estilizada -->
  <g transform="translate(96, 96)">
    <!-- Cuerpo de la botella -->
    <rect x="-24" y="10" width="48" height="60" rx="6" fill="none" stroke="#ff6f00" stroke-width="4"/>
    <!-- Hombro -->
    <path d="M-24,10 L-16,-18 L16,-18 L24,10" fill="none" stroke="#ff6f00" stroke-width="4" stroke-linejoin="round"/>
    <!-- Cuello -->
    <rect x="-10" y="-42" width="20" height="24" rx="3" fill="none" stroke="#ff6f00" stroke-width="4"/>
    <!-- Corona (boca) -->
    <rect x="-13" y="-52" width="26" height="10" rx="2" fill="#ff6f00"/>
    <!-- Fondo de la botella -->
    <rect x="-24" y="70" width="48" height="6" rx="3" fill="#ff6f00"/>
    <!-- Línea de escaneo (eje de visión) -->
    <line x1="-36" y1="30" x2="36" y2="30" stroke="#06b6d4" stroke-width="2" stroke-dasharray="4,3" opacity="0.8"/>
    <!-- Punto de análisis -->
    <circle cx="0" cy="30" r="4" fill="#06b6d4" opacity="0.9"/>
  </g>
  <!-- Texto "VD" -->
  <text x="96" y="178" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="14" fill="#ff6f00" opacity="0.7">VD</text>
</svg>
