<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="80" fill="#0e1013"/>
  <!-- Botella de vidrio estilizada (grande) -->
  <g transform="translate(256, 256)">
    <!-- Cuerpo de la botella -->
    <rect x="-65" y="28" width="130" height="160" rx="16" fill="none" stroke="#ff6f00" stroke-width="10"/>
    <!-- Hombro -->
    <path d="M-65,28 L-44,-50 L44,-50 L65,28" fill="none" stroke="#ff6f00" stroke-width="10" stroke-linejoin="round"/>
    <!-- Cuello -->
    <rect x="-26" y="-115" width="52" height="65" rx="8" fill="none" stroke="#ff6f00" stroke-width="10"/>
    <!-- Corona (boca) -->
    <rect x="-34" y="-140" width="68" height="26" rx="6" fill="#ff6f00"/>
    <!-- Fondo de la botella -->
    <rect x="-65" y="188" width="130" height="16" rx="8" fill="#ff6f00"/>
    <!-- Líneas de escaneo (eje de visión) -->
    <line x1="-90" y1="85" x2="90" y2="85" stroke="#06b6d4" stroke-width="4" stroke-dasharray="10,7" opacity="0.8"/>
    <line x1="-90" y1="120" x2="90" y2="120" stroke="#06b6d4" stroke-width="3" stroke-dasharray="10,7" opacity="0.5"/>
    <!-- Punto de análisis -->
    <circle cx="0" cy="85" r="10" fill="#06b6d4" opacity="0.9"/>
    <!-- Eje central -->
    <line x1="0" y1="-160" x2="0" y2="210" stroke="#10b981" stroke-width="2" opacity="0.35" stroke-dasharray="8,6"/>
  </g>
  <!-- Texto "VitroDiag" -->
  <text x="256" y="490" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="36" fill="#ff6f00" opacity="0.75">VitroDiag</text>
</svg>
